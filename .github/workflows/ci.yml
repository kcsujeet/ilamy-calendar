name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_ENV: test

jobs:
  check:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # Biome is a standalone binary that lints/formats source directly, so this
      # job needs neither `bun install` nor a build. Runs in parallel with the rest.
      - name: Lint & format
        run: bun run check

  build-test:
    name: Build, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build first: the recurrence package and demo resolve @ilamy/calendar
      # through its built dist/*.d.ts, so type-check and test depend on it.
      - name: Build
        run: bun run build

      - name: Type-check
        run: bun run type-check

      - name: Test
        run: bun run test

  fallow:
    name: Fallow analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Official composite action (prebuilt Rust binary, no Node runtime). Reads
      # fallow.toml. Defaults applied: gate=new-only (only findings introduced by
      # the change fail), auto-changed-since=true (PR/push delta scope),
      # fail-on-issues=true (gates the job).
      - name: Run fallow audit
        uses: fallow-rs/fallow@v2
        with:
          command: audit
          version: 2.90.0
          format: human
